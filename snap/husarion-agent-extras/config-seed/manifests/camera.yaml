concern: camera
title: Camera driver
icon: camera
fields:
  - { key: CAMERA_MODEL, scope: shared, type: enum, options: [OAK-D, OAK-D-LITE, OAK-1, OAK-1-LITE, OAK-D-PRO, OAK-D-PRO-W], default: OAK-D-PRO, label: Camera model, help: "OAK-x model — snap-side validation only; the driver autodetects the hardware." }
  - { key: CAMERA_PARAMS, scope: shared, type: enum, dynamic: { path: "${SNAP_DATA}", glob: "camera-params-*.yaml" }, default: default, label: Pipeline preset, help: "Camera pipeline. Options are the snap's camera-params-<X>.yaml presets (drop your own to add one). default = raw RGB (host re-encodes). streaming-h264 = OAK chip's hardware H.264 on <name>/rgb/image_raw/compressed (no raw, no rectify/point-cloud — those are forced off). oak-d-pro* = depth/SLAM." }
  - { key: NAME, scope: shared, type: string, pattern: '^[0-9a-z_-]{0,20}$', default: oak, label: Node name, help: "ROS node name + topic prefix (/<ns>/<name>/rgb/...)." }
  - { key: ENABLE_POINTCLOUD, scope: shared, type: enum, options: ["false","true"], default: "false", label: Point cloud, help: "Load the RGB-D point-cloud node. Requires an RGBD pipeline (e.g. Pipeline preset = oak-d-pro). Ignored (forced off) when Pipeline preset = streaming-h264." }
  - { key: RECTIFY_RGB, scope: shared, type: enum, options: ["true","false"], default: "true", label: Rectify RGB, help: "Publish <name>/rgb/image_rect alongside the raw stream. Ignored (forced off) when Pipeline preset = streaming-h264 (the chip H.264 path has no raw input to rectify)." }
