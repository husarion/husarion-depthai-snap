---
# Generic low-bandwidth RGB-only preset; works on any OAK-x.
# Disables depth/IMU/IR; shrinks H.264 stream to ~768x432 @ 20fps quality 20.
/**:
  ros__parameters:
    camera:
      i_enable_imu: false                   # default: true
      i_enable_ir: false                    # default: true
      i_nn_type: none                       # default: spatial
      i_pipeline_type: RGB                  # default: RGBD
      i_restart_on_diagnostics_error: true  # default: false
    rgb:
      i_enable_lazy_publisher: false        # default: true
      i_fps: 30.0                           # default: 30.0
      # USB preset: low_bandwidth off — depthai sends raw RGB, ffmpeg_image_transport
      # does the only encoding pass. Avoids MJPEG→ffmpeg compounding artifacts.
      i_low_bandwidth: false                # default: false (explicit for clarity)
      i_low_bandwidth_quality: 50           # default: 50 (irrelevant when low_bandwidth=false)
      i_max_q_size: 4                       # default: 30; smaller queue = lower latency for control loops (drops frames if consumer slow)
      i_resolution: '1080P'                 # explicit; ISP default scaling (i_isp_num=2/i_isp_den=3) → 1280x720
    # Advanced: for low-latency teleop, consider best_effort QoS on image topics.
    # Note: exact topic path depends on driver.name and ros.namespace.
    # qos_overrides:
    #   /oak/rgb/image_raw:
    #     publisher:
    #       reliability: best_effort
    #       durability: volatile
