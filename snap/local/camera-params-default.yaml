---
# Generic low-bandwidth RGB-only preset; works on any OAK-x.
# Disables depth/IMU/IR; shrinks H.264 stream to ~768x432 @ 20fps quality 20.
/**:
  ros__parameters:
    camera:
      i_enable_imu: false                   # default: true
      i_enable_ir: false                    # default: true
      i_nn_type: none                       # default: spatial
      i_pipeline_type: RGB                  # default: RGBD
      i_restart_on_diagnostics_error: true  # default: false
      # SUPER_PLUS lifts the USB negotiation cap; OAK still tops out at SUPER physically.
      i_usb_speed: SUPER_PLUS               # default: SUPER
    rgb:
      i_enable_lazy_publisher: false        # default: true
      i_fps: 20.0                           # default: 30.0
      # ISP scales 1080P (1920x1080) by i_isp_num/i_isp_den = 2/5 → 768x432.
      # Don't set i_width/i_height explicitly — they would override ISP scaling.
      # See: https://docs.luxonis.com/software/ros/depthai-ros/driver/
      i_isp_den: 5                          # default: 3
      i_low_bandwidth: true                 # default: false
      i_low_bandwidth_quality: 20           # default: 50
      i_resolution: '1080P'
      i_set_isp_scale: true
