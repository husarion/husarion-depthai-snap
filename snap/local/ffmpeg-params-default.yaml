---
# ffmpeg_image_transport 3.x derives the parameter prefix from the publisher's
# advertised base topic name (slash → dot, leading slash stripped):
#   - depthai_ros_driver::Camera advertises `oak/rgb/image_raw`
#       → prefix `oak.rgb.image_raw.ffmpeg.*`
#   - image_proc::RectifyNode advertises base name `image_rect` (later remapped)
#       → prefix `image_rect.ffmpeg.*`
# If you change `driver.name` from the default `oak`, update the first block.
#
# Recognized keys (from libffmpeg_image_transport_component.so):
#   encoder, bit_rate, gop_size, qmax, max_b_frames, pixel_format,
#   encoder_av_options (comma-separated `key:value` pairs, e.g. `preset:ultrafast,tune:zerolatency`),
#   encoder_measure_performance.
/**:
  ros__parameters:
    oak:
      rgb:
        image_raw:
          ffmpeg:
            encoder: libx264
            # libx264 requires an explicit bitrate (or CRF via av_options); the
            # default sentinel -1 makes `avcodec_open2` fail with "bitrate not
            # specified". 4 Mbps is a good 720p30 sweet spot.
            bit_rate: 4000000
            # 2s keyframe interval @ 30fps — late subscribers (Foxglove, rviz)
            # can start decoding within ~2s. libav default is 250 → ~8s wait
            # for the next IDR. Shorter GOP = faster recovery but higher
            # bandwidth (keyframes are 5-10x larger than P-frames).
            gop_size: 60
            encoder_av_options: "preset:ultrafast,tune:zerolatency"
    image_rect:
      ffmpeg:
        encoder: libx264
        bit_rate: 4000000
        gop_size: 60
        encoder_av_options: "preset:ultrafast,tune:zerolatency"
