---
/**:
  ros__parameters:
    ffmpeg_image_transport:

      # find the list of available encoders by running `ffmpeg -encoders`
      encoding: libx264
      
      # find the list of available presets by running `ffmpeg -h encoder=libx264`
      preset: ultrafast
      tune: zerolatency
      # 0.5s keyframe interval @ 30fps — late subscribers (Foxglove, rviz) can
      # start decoding within ~half a second. libav default is 250 → ~8s wait
      # for next IDR, which manifests as "playing 10s-old footage" on connect.
      gop_size: 15