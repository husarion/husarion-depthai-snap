---
# Chip-encoded H.264 stream — 1080p @ 60 fps (smooth-motion teleop variant of
# chip-H.264 family). Uses the OAK chip's hardware VideoEncoder; the i_low_bandwidth
# path drops raw /oak/rgb/image_raw and publishes the H.264 bitstream on
# /oak/rgb/image_raw/compressed (ffmpeg_image_transport_msgs/FFMPEGPacket).
#
# OAK-D-PRO (IMX378) supports 1080P @ 60 fps natively; the on-chip H.264 encoder
# (≤248 Mpix/s) handles 1080p60 at ~half its budget. Pair with rectify-rgb=false
# + enable-pointcloud=false (the launcher forces these off for rgb-h264-* / depth-disp-h264).
/**:
  ros__parameters:
    camera:
      i_enable_imu: false
      i_enable_ir: false
      i_nn_type: none
      i_pipeline_type: RGB
      i_restart_on_diagnostics_error: true
    rgb:
      i_enable_lazy_publisher: false
      i_fps: 60.0
      i_low_bandwidth: true
      # H264_BASELINE (profile 0), NOT High/Main: baseline has no B-frames, so the
      # browser's WebCodecs decoder stays reliably 1-in-1-out with no reorder
      # latency (Main/High can buffer several frames after a keyframe — w3c/webcodecs#732).
      i_low_bandwidth_profile: 0          # H264_BASELINE (low-latency teleop)
      i_low_bandwidth_bitrate: 6000000    # 6 Mbps @ true 1080p60 — 4x the pixels/s
                                          # of the 720p30 default; modest enough for
                                          # a decent WiFi link, raise on wired.
      i_low_bandwidth_frame_freq: 60      # encoder frame cadence = fps → ~1 s GOP
                                          # (bounds reconnect: a late subscriber
                                          # waits at most one keyframe to decode).
      i_max_q_size: 1                     # keep only the freshest encoded frame on
                                          # the host (a deeper queue adds stale-frame lag).
      i_publish_compressed: true          # required — false triggers host decode bug #687
      i_resolution: '1080P'
      # The driver's default ISP scale is 2/3 (1080P -> 720p); pin 1/1 for TRUE
      # 1080p output (1920x1080; width is a multiple of 32, required by the encoder).
      i_isp_num: 1
      i_isp_den: 1
