---
# !!! DRAFT — requires an OAK-D-class STEREO camera; UNVERIFIED on the connected
# OAK-1 (RGB-only). Selecting this on a single-sensor unit will fail at stereo init.
#
# RGB + depth dual output via husarion_depthai_pipeline (RGBDDual):
#   /oak/rgb/image_raw                raw RGB Image            (autonomy)
#   /oak/rgb/image_raw/compressed     on-chip H.264 RGB       (telepresence)
#   /oak/stereo/image_raw             depth 16UC1 Image        (autonomy — METRIC)
#   /oak/stereo/image_raw/compressed  disparity H.264 view     (telepresence — VIEW)
#
# LOAD-BEARING: the depth /compressed leg is the lossy 8-bit DISPARITY encoded as
# grayscale H.264 — a viewable visualization ONLY. Metric depth data always travels
# as the raw 16UC1 /oak/stereo/image_raw topic; never consume the H.264 as distance.
/**:
  ros__parameters:
    oak.rgb.image_raw.enable_pub_plugins: ['image_transport/raw']
    oak.stereo.image_raw.enable_pub_plugins: ['image_transport/raw']
    camera:
      i_enable_imu: false
      i_enable_ir: true                      # IR projector aids stereo on OAK-D-PRO
      i_nn_type: none
      i_pipeline_type: 'husarion_depthai::pipeline_gen::RGBDDual'
      i_restart_on_diagnostics_error: true
    rgb:
      i_enable_lazy_publisher: false
      i_fps: 30.0
      i_max_q_size: 4
      i_resolution: '1080P'
      i_isp_num: 2                           # 1280x720 RGB
      i_isp_den: 3
      i_low_bandwidth_profile: 0
      i_low_bandwidth_bitrate: 4000000       # 4 Mbps RGB H.264
      i_low_bandwidth_frame_freq: 30
    stereo:
      i_enable_lazy_publisher: false
      i_align_depth: true                    # align depth to the RGB (CAM_A) frame
      i_subpixel: true
      i_low_bandwidth_profile: 0
      i_low_bandwidth_bitrate: 4000000       # 4 Mbps disparity-view H.264
      i_low_bandwidth_frame_freq: 30
