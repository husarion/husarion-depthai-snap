---
# ============================================================================
# CANONICAL dual-output preset — the dual-rgb* family's reference file. The
# variants (-1080p, -360p, -*-raw-*-enc) point here for the how/why.
# ============================================================================
# Publishes BOTH representations of the RGB stream from one OAK at once, via the
# CUSTOM husarion_depthai_pipeline plugin (an external pluginlib package built
# into this snap — NOT stock depthai, NOT a fork; durable source: the snap repo
# `ros/husarion_depthai_pipeline/`). The OAK's hardware VideoEncoder does the
# H.264; no host encode, no /dev/dri, no new snap interface.
#
#   /oak/rgb/image_raw             raw sensor_msgs/Image     → autonomy / ROS 2 nodes
#   /oak/rgb/image_raw/compressed  on-chip H.264 FFMPEGPacket → telepresence (cockpit)
#
# Under the hood: the plugin taps ONE ColorCamera.video (NV12) output to both a
# raw XLinkOut (→ image_raw) and the on-chip VideoEncoder (→ image_raw/compressed).
# One dai output fanned to two consumers — that's the trick the stock driver can't
# do (i_low_bandwidth is either/or: true = encoded only / false = raw + a ~57%-CPU
# host libx264 .../ffmpeg).
#
# VERIFIED LIVE on an OAK-1 (USB3 SUPER, 2026-06-22): raw 1280x720 + on-chip H.264
# both at 30 fps, depthai daemon ~12.7% CPU. That ~12.7% is the host NV12->bgr8
# conversion for the raw image_raw topic (BGR is what ROS nodes want); the H.264
# encode is on-chip and ~free. (NB: an earlier standalone probe showed ~4% because
# it measured only the raw byte tap, NOT the NV12->bgr8 conversion + ROS publish.)
# Far below the raw-then-host-reencode path (~98% of one core — ROS-transport-bound
# on the 83 MB/s raw firehose, NOT the codec).
#
# Cockpit (verified, no cockpit change): the camera node auto-follows the OAK base
# topic, prefers .../compressed (passthrough, ~0 host CPU, badge sensor-h264) for
# telepresence, and autonomy reads the raw. Decodes at full fps in the webui.
#
# Generic-over-streams plugin: dual-rgbd (class RGBDDual) adds a DRAFT depth path
# (depth 16UC1 raw + disparity grayscale-H.264 view) the same way — UNVERIFIED,
# needs a stereo OAK.
/**:
  ros__parameters:
    # Suppress the raw stream's image_transport republisher plugins so the on-chip
    # H.264 is the SOLE publisher on .../image_raw/compressed (otherwise the lazy
    # CompressedImage republisher claims the same name → two types on one topic).
    oak.rgb.image_raw.enable_pub_plugins: ['image_transport/raw']
    camera:
      i_enable_imu: false                   # OAK-1: no IMU
      i_enable_ir: false                    # OAK-1: no IR
      i_nn_type: none
      # Custom pipeline plugin (pluginlib). Not one of the stock RGB/RGBD types —
      # the driver falls through to the class loader for unknown names.
      i_pipeline_type: 'husarion_depthai::pipeline_gen::RGBDual'
      i_restart_on_diagnostics_error: true
    rgb:
      i_enable_lazy_publisher: false        # raw stays up for autonomy regardless of subs
      i_fps: 30.0
      i_max_q_size: 4                        # small queue = low latency for control loops
      i_resolution: '1080P'                  # IMX378 1080P sensor mode
      i_isp_num: 2                           # ISP scale 2/3: 1920x1080 → 1280x720
      i_isp_den: 3
      # On-chip H.264 encoder config (consumed by the plugin's encoded publisher;
      # i_low_bandwidth itself is irrelevant here — the plugin always does both):
      i_low_bandwidth_profile: 0             # H264_BASELINE (low-latency teleop, no B-frames)
      i_low_bandwidth_bitrate: 4000000       # 4 Mbps @ 720p30
      i_low_bandwidth_frame_freq: 30         # keyframe cadence = fps → ~1 s GOP
