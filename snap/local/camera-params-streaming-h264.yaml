---
# Chip-encoded H.264 stream — 720p (1280x720) @ 30 fps. The balanced default of
# the streaming-h264 family; uses the OAK chip's hardware VideoEncoder instead of
# host-side libx264. Trades off ~50% daemon CPU savings against the rectify and
# pointcloud pipelines (see CLAUDE.md "Pitfalls" section). For other res/fps see
# the streaming-h264-{360p30,720p60,1080p60,4k30} variants.
#
# With i_low_bandwidth=true the depthai_ros_driver:
#   - skips publishing raw /oak/rgb/image_raw  (sensor_msgs/Image bgr8 disappears)
#   - publishes the chip's H.264 bitstream on /oak/rgb/image_raw/compressed as
#     a ffmpeg_image_transport_msgs/FFMPEGPacket (despite the "compressed" suffix)
#
# Pair with `driver.rectify-rgb=false` (no rect node, would have no input anyway)
# and `driver.enable-pointcloud=false` (PCL node needs raw RGB it can't get).
/**:
  ros__parameters:
    camera:
      i_enable_imu: false
      i_enable_ir: false
      i_nn_type: none
      i_pipeline_type: RGB
      i_restart_on_diagnostics_error: true
    rgb:
      i_enable_lazy_publisher: false
      i_fps: 30.0
      i_low_bandwidth: true
      # H264_BASELINE (profile 0), NOT Main: baseline has no B-frames, so the
      # browser's WebCodecs decoder is reliably 1-in-1-out with no reorder
      # latency — Main streams can need several frames buffered after a keyframe
      # before the first decode (w3c/webcodecs#732), adding teleop lag. The
      # small compression hit is the right trade for a control feed.
      i_low_bandwidth_profile: 0          # H264_BASELINE (low-latency teleop)
      i_low_bandwidth_bitrate: 2500000    # 2.5 Mbps @ 720p30 — plenty for a
                                          # teleop view; lower bitrate = less
                                          # chance of saturating a weak WiFi
                                          # link (which causes buffering lag)
      i_low_bandwidth_frame_freq: 30      # keyframe every 1 s @ 30 fps — bounds
                                          # reconnect latency (a late subscriber
                                          # waits up to one keyframe to decode)
      # Latency: q_size 1 keeps only the freshest encoded frame on the host —
      # a depth-4 queue adds up to ~130 ms of stale-frame buffering (Luxonis
      # low-latency guidance). (i_get_base_device_timestamp is left false: true
      # stamps frames with the device's monotonic clock, not host/ROS time,
      # which breaks overlay time-alignment.)
      i_max_q_size: 1
      i_publish_compressed: true          # required — false triggers host decode bug #687
      i_resolution: '1080P'               # sensor mode; ISP-downscaled below
      # Output resolution: 1080P sensor mode x 2/3 ISP scale = 1280x720. This is
      # the driver's default ISP ratio, pinned explicitly here so the output res
      # is unambiguous (width 1280 is a multiple of 32, required by the encoder).
      i_isp_num: 2
      i_isp_den: 3
